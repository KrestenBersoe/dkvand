app = 'dkvand'
primary_region = 'arn'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Sat til 1 (var 0): selvom volumen løser selve cache-persistens-problemet,
  # tilføjer volume-montering ved opstart (filsystem-tjek + mount) nok ekstra
  # tid til at Fly's proxy nogle gange giver op efter ~8,5 sek, før appen når
  # at blive klar — det viste sig som en "hængende" forbindelse for brugeren
  # ved kolde opstarter. Med min_machines_running=1 sker en kold opstart
  # aldrig for en rigtig bruger, kun ved deploy.
  min_machines_running = 1

[[mounts]]
  # Persistent lagring til .currents-cache.json — overlever autostop/start,
  # i modsætning til containerens rodfilsystem. Oprettes med:
  #   fly volumes create currents_cache --region arn --size 1
  source      = "currents_cache"
  destination = "/data"

[[vm]]
  # Opdateret fra 256mb (var årsag til gentagne OOM-kills) til 2048mb,
  # matcher den værdi der reelt er sat via Fly-dashboardet. Denne fil
  # overskriver dashboard-indstillinger ved næste `fly deploy` hvis den
  # ikke holdes i sync — derfor rettet her også, ikke kun i UI'en.
  memory = '2048mb'
  cpu_kind = 'shared'
  cpus = 1
